<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Um Novo Amanhecer | Recomeçar</title>

<meta name="description" content="Talvez você não esteja sofrendo por amor. Talvez esteja sofrendo por não conseguir se soltar do que já acabou.">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
    background:#f8f3ee;
}

body{
    display:flex;
    justify-content:center;
}

.container{
    position:relative;
    width:100%;
    max-width:1200px;
}

.container img{
    width:100%;
    height:auto;
    display:block;
}

/* BOTÃO TOPO */
.btn-topo{
    position:absolute;
    top:1.5%;
    right:3%;
    width:24%;
    height:3%;
    z-index:10;
}

/* BOTÃO PRINCIPAL */
.btn-principal{
    position:absolute;
    top:22.5%;
    left:6%;
    width:46%;
    height:4.2%;
    z-index:10;
}

/* BOTÃO RODAPÉ */
.btn-final{
    position:absolute;
    top:84.3%;
    left:54%;
    width:35%;
    height:3.2%;
    z-index:10;
}

.btn-topo,
.btn-principal,
.btn-final{
    display:block;
    text-decoration:none;
}

/* MOBILE */

@media(max-width:768px){

.btn-topo{
    top:1.4%;
    right:2%;
    width:27%;
}

.btn-principal{
    top:22.4%;
    left:6%;
    width:48%;
}

.btn-final{
    top:84.2%;
    left:54%;
    width:36%;
}

}

</style>
</head>

<body>

<div class="container">

    <img src="landing.jpg" alt="Um Novo Amanhecer">

    <!-- BOTÃO TOPO -->
    <a
    href="https://pay.hotmart.com/G106565928M"
    target="_blank"
    class="btn-topo"
    aria-label="Quero meu recomeço agora">
    </a>

    <!-- BOTÃO PRINCIPAL -->
    <a
    href="https://pay.hotmart.com/G106565928M"
    target="_blank"
    class="btn-principal"
    aria-label="Quero meu recomeço agora">
    </a>

    <!-- BOTÃO FINAL -->
    <a
    href="https://pay.hotmart.com/G106565928M"
    target="_blank"
    class="btn-final"
    aria-label="Quero meu recomeço agora">
    </a>

</div>

</body>
</html>
