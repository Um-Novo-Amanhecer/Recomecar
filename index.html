<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Um Novo Amanhecer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f8f3ee;
    overflow-x:hidden;
}

.landing{
    position:relative;
    width:100%;
    max-width:1680px;
    margin:auto;
}

.landing img{
    width:100%;
    height:auto;
    display:block;
}

/* ÁREAS CLICÁVEIS */

/* botão topo */
.btn-top{
    position:absolute;
    left:76%;
    top:1.6%;
    width:20%;
    height:3.2%;
}

/* botão principal */
.btn-main{
    position:absolute;
    left:7%;
    top:23%;
    width:44%;
    height:4%;
}

/* botão rodapé */
.btn-footer{
    position:absolute;
    left:54%;
    top:84.6%;
    width:34%;
    height:3.5%;
}

.btn-top,
.btn-main,
.btn-footer{
    display:block;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="landing">

<img src="landing.jpg" alt="Um Novo Amanhecer">

<a href="https://SEU-LINK-HOTMART" class="btn-top"></a>

<a href="https://SEU-LINK-HOTMART" class="btn-main"></a>

<a href="https://SEU-LINK-HOTMART" class="btn-footer"></a>

</div>

</body>
</html>
