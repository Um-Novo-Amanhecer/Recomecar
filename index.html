<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>

}

.container{

    width:100%;

    left:7%;

    display:block;
}

/* BOTÃO CTA FINAL */

    top:89%;
    left:55%;

</head>

<body>

<div class="container">

    <img src="landing.jpg" alt="Um Novo Amanhecer">

    <!-- BOTÃO TOPO -->
    <a
        href="https://SEU-LINK-HOTMART-AQUI"
        class="btn-topo"
        target="_blank">
    </a>

    <!-- BOTÃO PRINCIPAL -->
    <a

    <!-- BOTÃO FINAL -->
